/* TOPO (ESTILO INSTAGRAM) */
.topo{
    position:absolute;
    top:30px;
    left:30px;
    right:30px;
    display:flex;
    justify-content:space-between;

}

.menu a{

}

/* ESPAÇO */
.espaco{
    height:140px;
}

/* CONTEÚDO */
.container{
    display:flex;
    justify-content:center;
    padding:20px;
}

.lista{
    display:flex;
    flex-direction:column;
    gap:40px;
    width:100%;
    max-width:800px;
}

/* CARD */
.card{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

/* FOTO */
.foto{
    width:180px;
    max-width:100%;
    border-radius:10px;
}

/* FOTO MAIOR (NEY) */
.foto-ney{
    width:220px;
}

/* AJUSTE MANUAL DO NEY */
.ney{

}
