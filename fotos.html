<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotos - Amigos de Estrada</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url('img/Arte 3.png') no-repeat center center fixed;
    background-size:cover;
    color:white;
}

/* TOPO ESTILO INSTAGRAM */
.topo{
    position:absolute;
    top:30px;
    left:30px;
    right:30px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

/* MENU */
.menu a{
    margin-left:20px;
    color:white;
    text-decoration:none;
}

/* ESPAÇO */
.espaco{
    height:140px;
}

/* GALERIA */
.galeria{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

/* IMAGENS */
.foto{
    width:100%;
    max-width:350px;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.foto:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<!-- TOPO -->
<div class="topo">

    <h1 style="margin:0;">Galeria de Fotos</h1>

    <div class="menu">
        <a href="index.html">Início</a>
        <a href="contato.html">Contato</a>
    </div>

</div>

<!-- ESPAÇO -->
<div class="espaco"></div>

<!-- GALERIA -->
<div class="galeria">

<img src="img/Foto 1.jpeg" class="foto" onclick="abrirImagem(this.src)">
<img src="img/Foto 11.jpeg" class="foto" onclick="abrirImagem(this.src)">
<img src="img/Foto 12.jpeg" class="foto" onclick="abrirImagem(this.src)">
<img src="img/Foto 13.jpeg" class="foto" onclick="abrirImagem(this.src)">
<img src="img/Foto 14.jpeg" class="foto" onclick="abrirImagem(this.src)">
<img src="img/Foto 2.jpeg" class="foto" onclick="abrirImagem(this.src)">
<img src="img/Foto 3.jpeg" class="foto" onclick="abrirImagem(this.src)">
<img src="img/Foto 4.jpeg" class="foto" onclick="abrirImagem(this.src)">
<img src="img/Foto 5.jpeg" class="foto" onclick="abrirImagem(this.src)">
<img src="img/Foto 6.jpeg" class="foto" onclick="abrirImagem(this.src)">
<img src="img/Foto 8.jpeg" class="foto" onclick="abrirImagem(this.src)">

</div>

<div style="width:100%; padding:40px 20px; display:flex; justify-content:flex-start;">

    <a href="https://wa.me/5519997007785" target="_blank"
    style="
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:white;
    ">

        <!-- ÍCONE -->
        <div style="
        width:65px;
        height:65px;
        background:black;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        box-shadow:0 6px 20px rgba(0,0,0,0.6);
        transition:0.3s;
        "
        onmouseover="this.style.transform='scale(1.1)'"
        onmouseout="this.style.transform='scale(1)'"
        >

            <svg viewBox="0 0 24 24" width="35" height="35" fill="white">
                <path d="M12 2a10 10 0 0 0-8.94 14.5L2 22l5.66-1.48A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.06-1.11l-.29-.17-3.36.88.9-3.28-.18-.3A8 8 0 1 1 12 20zm4.38-5.62c-.24-.12-1.43-.7-1.65-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.02-.38-1.94-1.2-.72-.64-1.2-1.44-1.34-1.68-.14-.24-.02-.37.1-.49.1-.1.24-.26.36-.39.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.3-.74-1.78-.2-.48-.4-.42-.54-.43h-.46c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2s.86 2.32.98 2.48c.12.16 1.7 2.6 4.12 3.64.58.25 1.04.4 1.4.51.58.18 1.1.16 1.5.1.46-.07 1.43-.58 1.64-1.14.2-.56.2-1.04.14-1.14-.06-.1-.22-.16-.46-.28z"/>
            </svg>

        </div>

        <!-- TEXTO -->
        <span style="
        font-size:16px;
        background:black;
        padding:10px 16px;
        border-radius:25px;
        ">
            Agende seu Show
        </span>

    </a>

</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="fecharImagem()"
style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:9999;">

    <img id="imgGrande" style="max-width:90%; max-height:90%; border-radius:10px;">

</div>

<script>
function abrirImagem(src){
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("imgGrande").src = src;
}

function fecharImagem(){
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
